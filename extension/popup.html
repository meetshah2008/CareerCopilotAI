<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerCopilot AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 340px; min-height: 420px; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: linear-gradient(160deg, #0f0a2e 0%, #1a1145 40%, #0f0a2e 100%); color: #e0e7ff; overflow-x: hidden; }
    .header { padding: 20px 20px 16px; text-align: center; border-bottom: 1px solid rgba(99, 102, 241, 0.15); position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at center, rgba(99, 102, 241, 0.08) 0%, transparent 70%); pointer-events: none; }
    .logo { font-size: 28px; margin-bottom: 4px; filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.5)); }
    .header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #a5b4fc, #c4b5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -0.3px; }
    .header p { font-size: 11px; color: #818cf8; margin-top: 4px; font-weight: 500; }
    .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 20px; background: rgba(99, 102, 241, 0.06); border-bottom: 1px solid rgba(99, 102, 241, 0.1); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.5); transition: all 0.3s; }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .status-text { font-size: 11px; color: #94a3b8; font-weight: 500; }
    .section { padding: 16px 20px; }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #6366f1; margin-bottom: 10px; }
    .query-box { display: flex; flex-direction: column; gap: 8px; }
    .query-box textarea { width: 100%; min-height: 70px; padding: 10px 12px; border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 10px; background: rgba(15, 10, 46, 0.7); color: #e0e7ff; font-family: 'Inter', system-ui, sans-serif; font-size: 12px; resize: vertical; outline: none; transition: border-color 0.2s; }
    .query-box textarea:focus { border-color: #6366f1; }
    .query-box textarea::placeholder { color: #4c4f8a; }
    .controls-row { display: flex; gap: 8px; align-items: center; }
    .controls-row select { flex: 1; padding: 8px 10px; border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 8px; background: rgba(15, 10, 46, 0.7); color: #e0e7ff; font-family: 'Inter', system-ui, sans-serif; font-size: 11px; outline: none; cursor: pointer; }
    .controls-row select:focus { border-color: #6366f1; }
    .btn-primary { flex: 1; padding: 8px 16px; border: none; border-radius: 8px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; pointer-events: none; }
    .answer-box { margin-top: 10px; padding: 12px; border: 1px solid rgba(99, 102, 241, 0.15); border-radius: 10px; background: rgba(30, 27, 75, 0.5); min-height: 60px; display: none; }
    .answer-box.visible { display: block; animation: fade-in 0.3s ease-out; }
    .answer-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #818cf8; margin-bottom: 6px; }
    .answer-text { font-size: 12px; line-height: 1.6; color: #c7d2fe; white-space: pre-wrap; }
    .copy-btn { margin-top: 8px; padding: 5px 12px; border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 6px; background: transparent; color: #a5b4fc; font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .copy-btn:hover { background: rgba(99, 102, 241, 0.15); border-color: #6366f1; }
    .footer { padding: 12px 20px; text-align: center; border-top: 1px solid rgba(99, 102, 241, 0.1); font-size: 10px; color: #4c4f8a; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🚀</div>
    <h1>CareerCopilot AI</h1>
    <p>RAG-powered job form assistant</p>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Checking backend…</span>
  </div>

  <div class="section">
    <div class="section-title">Ask a Question</div>
    <div class="query-box">
      <textarea id="queryInput" placeholder="e.g. Describe your role at Matrix Comsec"></textarea>
      <div class="controls-row">
        <select id="toneSelect">
          <option value="professional">Professional</option>
          <option value="short">Short</option>
          <option value="detailed">Detailed</option>
          <option value="ats_friendly">ATS Friendly</option>
          <option value="formal">Formal</option>
        </select>
        <button class="btn-primary" id="askBtn">✨ Generate</button>
      </div>
    </div>

    <div class="answer-box" id="answerBox">
      <div class="answer-label">Generated Answer</div>
      <div class="answer-text" id="answerText"></div>
      <button class="copy-btn" id="copyBtn">📋 Copy to clipboard</button>
    </div>
  </div>

  <div class="footer">
    CareerCopilot AI v1.0 — LangChain + FAISS + OpenRouter
  </div>

  <script src="popup.js"></script>
</body>
</html>
